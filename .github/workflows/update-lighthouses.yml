name: Update Lighthouse Data

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and filter lighthouse data
        env:
          LIGHTHOUSE_API_KEY: ${{ secrets.LIGHTHOUSE_API_KEY }}
        run: node scripts/update-lighthouses.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lighthouses.js
          if git diff --staged --quiet; then
            echo "변경사항 없음 — 커밋 생략"
          else
            git commit -m "chore: 등대 데이터 월간 자동 업데이트 $(date +'%Y-%m')"
            git push
          fi
