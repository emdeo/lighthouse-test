<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>사진 매칭 진단</title>
<style>
  body { font-family: sans-serif; padding: 20px; background:#f5f5f5; }
  h1 { font-size: 1.3rem; }
  #status { color:#666; margin-bottom: 1rem; }
  table { border-collapse: collapse; width: 100%; background:#fff; }
  th, td { border: 1px solid #ddd; padding: 6px 10px; font-size: .85rem; text-align:left; }
  th { background:#eee; position: sticky; top:0; }
  .summary { margin: 1rem 0; padding: .8rem 1rem; background:#fff3cd; border:1px solid #ffe58f; border-radius:6px; }
  button { padding: .5rem 1rem; cursor:pointer; }
</style>
</head>
<body>

<h1>📷 사진 매칭 진단 페이지</h1>
<p id="status">등대 데이터 불러오는 중...</p>
<div id="summary" class="summary" style="display:none;"></div>
<button id="downloadBtn" style="display:none;">결과 CSV로 다운로드</button>
<table id="resultTable" style="display:none;">
  <thead><tr><th>id</th><th>이름</th><th>영문명</th><th>구분</th></tr></thead>
  <tbody id="resultBody"></tbody>
</table>

<!-- 실제 사이트와 동일한 등대 데이터 파일들을 그대로 불러옵니다 -->
<script src="lighthouses.js"></script>
<script src="lighthouses_custom.js" onerror="console.warn('lighthouses_custom.js 없음 - 건너뜀')"></script>

<script>
const WEATHER_API_URL = "https://lighthouse-weather.ehdgml5032.workers.dev";

async function main() {
  const statusEl = document.getElementById('status');

  // 1. 실제 사이트와 동일하게 두 데이터 합치기 (커스텀 파일 없으면 빈 배열로 대체)
  const allLighthouses = [
    ...(typeof LIGHTHOUSE_DATA !== 'undefined' ? LIGHTHOUSE_DATA : []),
    ...(typeof LIGHTHOUSE_CUSTOM_DATA !== 'undefined' ? LIGHTHOUSE_CUSTOM_DATA : []),
  ];
  statusEl.textContent = `등대 ${allLighthouses.length}개 로드 완료. 이미지 목록 불러오는 중...`;

  // 2. Worker의 /image-list에서 전체 이미지 파일명 가져오기
  let images = [];
  try {
    const res = await fetch(`${WEATHER_API_URL}/image-list`);
    images = await res.json();
  } catch (e) {
    statusEl.textContent = '이미지 목록을 불러오는 데 실패했습니다: ' + e.message;
    return;
  }
  statusEl.textContent = `이미지 ${images.length}장 로드 완료. 매칭 검사 중...`;

  // 3. Worker의 /image 엔드포인트와 완전히 동일한 4단계 매칭 로직 재현
  const priorityPrefixes = ["stamp_", "month_"];

  function findMatch(name, id) {
    const fileId = (id || '').replace(/\s/g, '');
    const cleanName = (name || '').replace(/\s/g, '').replace(/\\n/g, '').replace(/\n/g, '');

    // 1순위: stamp_/month_ 접두사 + id 매칭
    let matched = fileId ? images.find(fn =>
      priorityPrefixes.some(p => fn.startsWith(p)) &&
      fn.includes(`_${fileId}_`)
    ) : null;

    // 2순위: id가 "C"로 시작하는 커스텀 항목만 이름으로 매칭
    if (!matched && fileId.toUpperCase().startsWith('C')) {
      matched = images.find(fn =>
        priorityPrefixes.some(p => fn.startsWith(p)) &&
        fn.replace(/\s/g, '').includes(cleanName)
      );
    }

    // 3순위: 그 외 사진 - id로 매칭
    if (!matched && fileId) {
      matched = images.find(fn =>
        !priorityPrefixes.some(p => fn.startsWith(p)) &&
        fn.includes(`_${fileId}_`)
      );
    }

    // 4순위: 그 외 사진 - 이름으로 매칭
    if (!matched) {
      matched = images.find(fn =>
        !priorityPrefixes.some(p => fn.startsWith(p)) &&
        fn.replace(/\s/g, '').includes(cleanName)
      );
    }

    return matched || null;
  }

  // 4. 전체 등대 검사
  const missing = [];
  for (const lh of allLighthouses) {
    const matched = findMatch(lh.name, lh.id);
    if (!matched) {
      missing.push(lh);
    }
  }

  // 5. 결과 렌더링
  statusEl.textContent = `검사 완료: 전체 ${allLighthouses.length}개 중 ${missing.length}개 사진 매칭 안 됨`;

  const summaryEl = document.getElementById('summary');
  summaryEl.style.display = 'block';
  summaryEl.innerHTML = `<strong>사진 없는 등대: ${missing.length}개</strong> (전체 ${allLighthouses.length}개 중)`;

  const tbody = document.getElementById('resultBody');
  tbody.innerHTML = missing.map(lh => `
    <tr>
      <td>${lh.id || ''}</td>
      <td>${(lh.name || '').replace(/\n/g, ' ')}</td>
      <td>${lh.nameEn || ''}</td>
      <td>${(lh.id || '').toUpperCase().startsWith('C') ? '커스텀' : '일반'}</td>
    </tr>
  `).join('');
  document.getElementById('resultTable').style.display = missing.length ? 'table' : 'none';

  // 6. CSV 다운로드 버튼
  const downloadBtn = document.getElementById('downloadBtn');
  if (missing.length) {
    downloadBtn.style.display = 'inline-block';
    downloadBtn.onclick = () => {
      const csv = 'id,name,nameEn\n' + missing.map(lh =>
        `"${lh.id || ''}","${(lh.name || '').replace(/\n/g, ' ')}","${lh.nameEn || ''}"`
      ).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'missing-images.csv';
      a.click();
      URL.revokeObjectURL(url);
    };
  }
}

main();
</script>
</body>
</html>
